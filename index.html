<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Share Tech Mono', monospace;
}

body{
  background:black;
  color:#00ff66;
  height:100vh;
  overflow:hidden;
}

/* scan lines */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,255,102,0.05),
    rgba(0,255,102,0.05) 1px,
    transparent 1px,
    transparent 4px
  );
  animation:scan 6s linear infinite;
}

@keyframes scan{
  from{transform:translateY(0);}
  to{transform:translateY(-120px);}
}

/* glitch overlay */
.glitch{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  animation:flash 7s infinite;
  z-index:999;
}

@keyframes flash{
  0%,94%,100%{opacity:0;}
  95%{opacity:1;}
  96%{opacity:0;}
}

/* terminal box */
.terminal{
  position:relative;
  z-index:2;
  padding:20px;
  font-size:14px;
  line-height:1.6;
  height:100vh;
  overflow:hidden;
}

.title{
  font-size:28px;
  margin-bottom:10px;
  animation:flicker 2s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1;}
  50%{opacity:0.6;}
}

.line{
  opacity:0;
  animation:show 0.5s forwards;
}

@keyframes show{
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="glitch"></div>

<div class="terminal">
  <div class="title">SYSTEM TERMINAL v3.7</div>
  <div id="log"></div>
</div>

<script>
const logs = [
"Booting system...",
"Loading kernel modules...",
"Bypassing security layers...",
"Establishing encrypted tunnel...",
"Injecting payload...",
"Accessing core directory...",
"WARNING: firewall unstable",
"TRACE DISABLED",
"ROOT ACCESS GRANTED",
"Welcome user..."
];

let i = 0;
const logBox = document.getElementById("log");

function addLine(){
  if(i >= logs.length) return;

  const div = document.createElement("div");
  div.className = "line";
  div.textContent = "> " + logs[i];

  logBox.appendChild(div);

  i++;
  setTimeout(addLine, 700);
}

addLine();
</script>

</body>
</html>
