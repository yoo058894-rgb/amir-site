<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Share Tech Mono', monospace;
}

body{
  background:black;
  color:#00ff66;
  height:100vh;
  overflow:hidden;
}

/* scan lines */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,255,102,0.05),
    rgba(0,255,102,0.05) 1px,
    transparent 1px,
    transparent 4px
  );
  animation:scan 6s linear infinite;
}

@keyframes scan{
  from{transform:translateY(0);}
  to{transform:translateY(-120px);}
}

/* RED ALERT */
.alert{
  position:fixed;
  width:100%;
  height:100%;
  background:red;
  z-index:999;
  opacity:0;
  pointer-events:none;
}

.alert.active{
  animation:alertFlash 4s forwards;
}

@keyframes alertFlash{
  0%{opacity:0;}
  10%{opacity:0.9;}
  20%{opacity:0.2;}
  40%{opacity:0.8;}
  60%{opacity:0.3;}
  100%{opacity:0;}
}

/* BLACKOUT */
.blackout{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  z-index:1000;
  opacity:0;
  pointer-events:none;
}

.blackout.active{
  animation:blackoutAnim 1s forwards;
}

@keyframes blackoutAnim{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:1;}
}

/* TERMINAL */
.terminal{
  position:relative;
  z-index:2;
  padding:20px;
  font-size:14px;
  line-height:1.6;
  height:100vh;
}

.title{
  font-size:26px;
  margin-bottom:10px;
  animation:flicker 2s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1;}
  50%{opacity:0.5;}
}

.line{
  opacity:0;
  animation:show 0.3s forwards;
}

@keyframes show{
  to{opacity:1;}
}

/* FINAL GLITCH TEXT */
.final{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:48px;
  color:#00ff66;
  display:none;
  letter-spacing:3px;
  z-index:2000;
}

.final.glitch{
  animation:glitch 0.2s infinite;
}

@keyframes glitch{
  0%{transform:translate(-50%,-50%) skew(0deg);}
  20%{transform:translate(-48%,-52%) skew(5deg);}
  40%{transform:translate(-52%,-50%) skew(-5deg);}
  60%{transform:translate(-50%,-48%) skew(3deg);}
  100%{transform:translate(-50%,-50%) skew(0deg);}
}
</style>
</head>

<body>

<div class="alert" id="alert"></div>
<div class="blackout" id="blackout"></div>

<div class="terminal" id="terminal">
  <div class="title">SYSTEM TERMINAL v5.0</div>
  <div id="log"></div>
</div>

<div class="final" id="finalText"></div>

<script>
const logs = [
"Booting system...",
"Loading kernel modules...",
"Bypassing security layers...",
"Establishing encrypted tunnel...",
"Injecting payload...",
"Accessing core directory...",
"WARNING: firewall unstable",
"TRACE DISABLED",
"ROOT ACCESS GRANTED",
"Welcome user..."
];

let i = 0;
const logBox = document.getElementById("log");

function addLine(){
  if(i >= logs.length){
    triggerAlert();
    return;
  }

  const div = document.createElement("div");
  div.className = "line";
  div.textContent = "> " + logs[i];

  logBox.appendChild(div);

  i++;
  setTimeout(addLine, 500);
}

/* 🔊 error sound */
function playBeep(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "square";
  osc.frequency.setValueAtTime(120, ctx.currentTime);

  gain.gain.setValueAtTime(0.1, ctx.currentTime);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.2);
}

/* RED ALERT */
function triggerAlert(){
  playBeep();

  const alert = document.getElementById("alert");
  alert.classList.add("active");

  setTimeout(() => {
    triggerBlackout();
  }, 4000);
}

/* BLACKOUT 1s */
function triggerBlackout(){
  const blackout = document.getElementById("blackout");
  const terminal = document.getElementById("terminal");

  blackout.classList.add("active");

  setTimeout(() => {
    terminal.style.display = "none";
    showFinal();
  }, 1000);
}

/* FINAL GLITCH TEXT */
function showFinal(){
  const text = "COMING SOON";
  const el = document.getElementById("finalText");

  el.style.display = "block";
  el.classList.add("glitch");

  let i = 0;

  function type(){
    if(i < text.length){
      el.textContent += text[i];
      i++;
      setTimeout(type, 120);
    }
  }

  type();
}

addLine();
</script>

</body>
</html>
