<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0f172a, #000);
    overflow: hidden;
}

/* لایه نور */
.glow {
    position: absolute;
    width: 450px;
    height: 450px;
    background: #3b82f6;
    filter: blur(160px);
    opacity: 0;
    border-radius: 50%;
    animation: glowIn 2s ease forwards;
}

@keyframes glowIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 0.35; transform: scale(1); }
}

/* کارت */
.card {
    position: relative;
    padding: 60px 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    color: white;
    box-shadow: 0 0 50px rgba(0,0,0,0.6);

    opacity: 0;
    transform: scale(0.7);
    animation: popIn 1.2s ease forwards;
    animation-delay: 0.5s;
}

@keyframes popIn {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* متن */
.card h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 2px;
}

.card p {
    margin-top: 15px;
    font-size: 18px;
    color: rgba(255,255,255,0.7);
}

/* نقطه چشمک زن */
.dot::after {
    content: '...';
    animation: blink 1.5s infinite;
}

@keyframes blink {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="card">
    <h1>Coming Soon<span class="dot"></span></h1>
    <p>A new experience is being built</p>
</div>

</body>
</html>
